name: Gymly Deployment Workflow

on:
    push:
        branches: [main]

jobs:
    build_and_deploy:
        name: Build and Deploy Gymly Image to Docker Hub
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v2
            
            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Echo Docker Username
              run: echo "${{ secrets.DOCKER_USERNAME }}" | cat -A
            
            - name: Extract metadata 
              id: meta
              uses: docker/metadata-action@v4
              with:
                images: ${{ secrets.DOCKER_USERNAME }}/gymly
                tags: |
                    type=ref,event=branch
                    type=semver,pattern={{version}}
                    type=sha,format=short
                    latest
            
            - name: Echo Tags
              run: |
                echp "Tag generated: ${{ steps.meta.outputs.tags }}"
            
            - name: Build and Push Image
              uses: docker/build-push-action@v4
              with:
                context: Dockerfile
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max